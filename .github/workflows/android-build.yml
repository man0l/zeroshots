name: Android Build

on:
  push:
    branches: [main, enet_analytics]
    paths:
      - 'screenshot-organizer/src/**'
      - 'screenshot-organizer/app/**'
      - 'screenshot-organizer/assets/**'
      - 'screenshot-organizer/package.json'
      - 'screenshot-organizer/package-lock.json'
      - 'screenshot-organizer/tsconfig.json'
      - 'screenshot-organizer/app.json'
      - '.github/workflows/android-build.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: screenshot-organizer

env:
  GRADLE_OPTS: -Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.parallel=true

jobs:
  build:
    name: Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: screenshot-organizer/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Expo prebuild
        run: npx expo prebuild --platform android --no-install

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('screenshot-organizer/android/**/*.gradle*', 'screenshot-organizer/android/**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build debug APK
        working-directory: screenshot-organizer/android
        run: ./gradlew assembleDebug --no-daemon --build-cache -x lint -x test

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: screenshot-organizer/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
