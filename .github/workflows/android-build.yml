name: Android Build

on:
  push:
    branches: [main, enet_analytics]
    paths:
      - 'screenshot-organizer/src/**'
      - 'screenshot-organizer/app/**'
      - 'screenshot-organizer/assets/**'
      - 'screenshot-organizer/package.json'
      - 'screenshot-organizer/package-lock.json'
      - 'screenshot-organizer/tsconfig.json'
      - 'screenshot-organizer/app.json'
      - '.github/workflows/android-build.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: screenshot-organizer

jobs:
  build:
    name: Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: screenshot-organizer/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Get app version
        id: version
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          echo "app_version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Expo prebuild
        run: npx expo prebuild --platform android --no-install

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Build debug APK (arm64 only)
        working-directory: screenshot-organizer/android
        run: >
          ./gradlew assembleDebug
          -PreactNativeArchitectures=arm64-v8a
          -Dorg.gradle.jvmargs=-Xmx4g
          -Dorg.gradle.parallel=true
          --build-cache
          --no-daemon
          -x lint
          -x test

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: screenshot-organizer/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="android-v${{ steps.version.outputs.app_version }}-build.${{ github.run_number }}"
          SHORT_SHA="${GITHUB_SHA::7}"

          gh release create "$TAG" \
            ../android/app/build/outputs/apk/debug/app-debug.apk \
            --title "Android Debug Build #${{ github.run_number }}" \
            --notes "$(cat <<EOF
          **Version:** ${{ steps.version.outputs.app_version }}
          **Commit:** [\`${SHORT_SHA}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
          **Branch:** \`${{ github.ref_name }}\`
          **Architecture:** arm64-v8a

          Built from workflow run [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          EOF
          )" \
            --prerelease
