<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screenshot Organizer - The Stack</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#38BDF8',
            background: '#0F172A',
            surface: '#1E293B',
            delete: '#EF4444',
            keep: '#10B981',
            archive: '#8B5CF6',
          },
          fontFamily: {
            display: ['Space Grotesk', 'sans-serif'],
            body: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
        },
      },
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .glass { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
    .glow-red { box-shadow: 0 0 15px rgba(239, 68, 68, 0.3), inset 0 0 8px rgba(239, 68, 68, 0.2); }
    .glow-green { box-shadow: 0 0 15px rgba(16, 185, 129, 0.3), inset 0 0 8px rgba(16, 185, 129, 0.2); }
    .glow-purple { box-shadow: 0 0 15px rgba(139, 92, 246, 0.3), inset 0 0 8px rgba(139, 92, 246, 0.2); }
  </style>
</head>
<body class="bg-background min-h-screen text-white font-body">
  <!-- Header -->
  <header class="flex items-center justify-between px-6 pt-12 pb-4">
    <div class="glass rounded-full px-4 py-2">
      <div class="text-xs text-gray-400 uppercase tracking-widest font-bold">Daily Trust</div>
      <div class="flex items-center gap-2 mt-1">
        <span class="font-display font-bold text-primary" id="trust-value">4/15</span>
        <div class="w-16 h-1.5 bg-background/60 rounded-full overflow-hidden border border-white/5">
          <div class="h-full bg-primary rounded-full" style="width: 26%"></div>
        </div>
      </div>
    </div>
    <button class="glass w-12 h-12 rounded-full flex items-center justify-center text-gray-400" id="grid-btn">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
      </svg>
    </button>
  </header>

  <!-- Card Stack -->
  <main class="flex-1 flex flex-col items-center justify-center px-4">
    <div class="relative w-full max-w-sm aspect-[3/4.5]" id="card-container">
      <!-- Background cards -->
      <div class="absolute inset-x-4 -bottom-4 h-full glass rounded-3xl opacity-20 scale-[0.92] translate-y-2"></div>
      <div class="absolute inset-x-2 -bottom-2 h-full glass rounded-3xl opacity-40 scale-[0.96] translate-y-1"></div>
      
      <!-- Main card -->
      <div class="absolute inset-0 bg-surface rounded-3xl overflow-hidden border border-white/10" id="main-card">
        <img src="https://picsum.photos/seed/screenshot1/400/600" alt="Screenshot" class="absolute inset-0 w-full h-full object-cover">
        
        <!-- Tag badge -->
        <div class="absolute top-5 right-5 glass px-3 py-1.5 rounded-lg">
          <span class="tag-badge text-primary font-bold text-xs uppercase tracking-widest">#RECEIPT</span>
        </div>
        
        <!-- Bottom info -->
        <div class="absolute inset-x-0 bottom-0 h-1/2 bg-gradient-to-t from-background via-background/80 to-transparent">
          <div class="absolute bottom-8 left-8 right-8">
            <div class="flex items-baseline gap-2 mb-3">
              <span class="font-display font-bold text-5xl text-delete" id="age-display">420d</span>
              <span class="text-xs font-display text-gray-400 uppercase tracking-widest">old</span>
            </div>
            <div class="flex flex-wrap items-center gap-3">
              <div class="glass px-2.5 py-1.5 rounded-md flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4" />
                </svg>
                <span class="font-mono text-xs text-white/90" id="size-display">2.8 MB</span>
              </div>
              <div class="glass px-2.5 py-1.5 rounded-md flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
                <span class="font-mono text-xs text-white/90">PNG</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Action Buttons -->
  <footer class="px-8 pb-8">
    <div class="flex items-center justify-center gap-6">
      <button class="w-20 h-20 rounded-full glass border-delete/30 text-delete glow-red flex items-center justify-center text-3xl hover:bg-delete/10 transition-all active:scale-95" id="delete-btn">
        ✕
      </button>
      <button class="w-14 h-14 rounded-full glass border-archive/30 text-archive glow-purple flex items-center justify-center text-2xl hover:bg-archive/10 transition-all active:scale-95" id="archive-btn">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4" />
        </svg>
      </button>
      <button class="w-20 h-20 rounded-full glass border-keep/30 text-keep glow-green flex items-center justify-center text-3xl hover:bg-keep/10 transition-all active:scale-95" id="keep-btn">
        ✓✓
      </button>
    </div>
    
    <div class="mt-8 flex justify-between items-center opacity-30 px-2">
      <span class="text-xs font-bold uppercase tracking-widest text-delete">Swipe Left to Kill</span>
      <div class="h-px flex-1 mx-4 bg-gradient-to-r from-delete/50 via-white/20 to-keep/50"></div>
      <span class="text-xs font-bold uppercase tracking-widest text-keep">Swipe Right to Keep</span>
    </div>
  </footer>

  <!-- Stats display -->
  <div class="fixed bottom-0 left-0 right-0 glass border-t border-white/5 py-4 flex justify-around items-center">
    <div class="text-center text-gray-400">
      <div class="text-2xl font-display font-bold" id="deleted-count">0</div>
      <div class="text-xs uppercase tracking-widest">Deleted</div>
    </div>
    <div class="text-center text-gray-400">
      <div class="text-2xl font-display font-bold" id="archived-count">0</div>
      <div class="text-xs uppercase tracking-widest">Archived</div>
    </div>
    <div class="text-center text-gray-400">
      <div class="text-2xl font-display font-bold" id="kept-count">0</div>
      <div class="text-xs uppercase tracking-widest">Kept</div>
    </div>
  </div>

  <script>
    const screenshots = [
      { id: 1, image: 'https://picsum.photos/seed/screenshot1/400/600', age: 420, size: 2.8, tag: 'RECEIPT' },
      { id: 2, image: 'https://picsum.photos/seed/screenshot2/400/600', age: 180, size: 1.2, tag: 'MEME' },
      { id: 3, image: 'https://picsum.photos/seed/screenshot3/400/600', age: 30, size: 3.5, tag: 'CHAT' },
      { id: 4, image: 'https://picsum.photos/seed/screenshot4/400/600', age: 7, size: 0.9, tag: 'ERROR' },
    ];

    let currentIndex = 0;
    let deletedCount = 0;
    let archivedCount = 0;
    let keptCount = 0;
    let trustUsed = 4;

    function updateCard() {
      const card = screenshots[currentIndex];
      if (!card) {
        document.getElementById('main-card').innerHTML = `
          <div class="absolute inset-0 flex flex-col items-center justify-center text-center p-8">
            <div class="text-6xl mb-4">🎉</div>
            <h2 class="font-display font-bold text-2xl mb-2">All Done!</h2>
            <p class="text-gray-400">You've reviewed all screenshots</p>
          </div>
        `;
        return;
      }
      
      document.querySelector('#main-card img').src = card.image;
      document.getElementById('age-display').textContent = card.age + 'd';
      document.getElementById('size-display').textContent = card.size + ' MB';
      document.querySelector('#main-card .tag-badge').textContent = '#' + card.tag;
    }

    function updateStats() {
      document.getElementById('deleted-count').textContent = deletedCount;
      document.getElementById('archived-count').textContent = archivedCount;
      document.getElementById('kept-count').textContent = keptCount;
    }

    function updateTrust() {
      document.getElementById('trust-value').textContent = `${trustUsed}/15`;
      document.querySelector('.h-full.bg-primary').style.width = `${(trustUsed / 15) * 100}%`;
    }

    function handleAction(action) {
      if (action === 'delete') {
        if (trustUsed >= 15) {
          alert('Trust limit reached! Upgrade to unlimited for $4.99');
          return;
        }
        deletedCount++;
        trustUsed++;
        updateTrust();
      } else if (action === 'archive') {
        archivedCount++;
      } else if (action === 'keep') {
        keptCount++;
      }
      
      currentIndex++;
      updateStats();
      updateCard();
    }

    document.getElementById('delete-btn').addEventListener('click', () => handleAction('delete'));
    document.getElementById('archive-btn').addEventListener('click', () => handleAction('archive'));
    document.getElementById('keep-btn').addEventListener('click', () => handleAction('keep'));
    
    updateCard();
  </script>
</body>
</html>
