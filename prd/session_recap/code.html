<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Session Recap - Cyber-Kinetic UI</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@400;500;600&amp;family=JetBrains+Mono&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#38BDF8",
                        "background-dark": "#0F172A",
                        "surface": "#1E293B",
                        "delete": "#EF4444",
                        "keep": "#10B981",
                        "archive": "#8B5CF6",
                        "slate-100": "#F1F5F9",
                        "slate-400": "#94A3B8",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"],
                    },
                    boxShadow: {
                        'tech': '0 10px 0 0 #CBD5E1',
                        'glow-hero': '0 0 30px rgba(255, 255, 255, 0.15)',
                    }
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        @layer utilities {
            .glass-card {
                @apply bg-white/5 backdrop-blur-xl border border-white/10;
            }
            .mask-radial {
                mask-image: radial-gradient(circle, black, transparent 80%);
            }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark min-h-screen flex flex-col font-body text-slate-100 antialiased overflow-hidden">
<header class="flex items-center justify-between px-6 pt-12 pb-4 z-20">
<button class="p-2 rounded-full hover:bg-white/5 transition-colors text-slate-400">
<span class="material-symbols-outlined text-2xl">close</span>
</button>
<div class="text-slate-400 text-[10px] font-bold tracking-[0.2em] uppercase font-body">Session Recap</div>
<div class="w-10"></div> 
</header>
<main class="flex-1 flex flex-col items-center justify-center relative w-full max-w-md mx-auto px-6 pb-12 z-10">
<div class="absolute inset-0 pointer-events-none overflow-hidden">
<div class="absolute top-1/2 left-1/4 -translate-y-1/2 w-48 h-48 bg-delete/20 rounded-full blur-[80px]"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-64 h-64 bg-archive/20 rounded-full blur-[100px]"></div>
<div class="absolute top-1/2 right-1/4 -translate-y-1/2 w-48 h-48 bg-slate-400/10 rounded-full blur-[80px]"></div>
</div>
<div class="text-center mb-16 relative">
<div class="text-[10px] font-bold tracking-[0.3em] uppercase text-primary mb-4 block">Storage Reclaimed</div>
<h1 class="font-display font-bold text-8xl tracking-tight text-white drop-shadow-[0_0_25px_rgba(255,255,255,0.2)]">
                142<span class="text-3xl text-slate-400 ml-1 font-medium font-mono">MB</span>
</h1>
</div>
<div class="w-full grid grid-cols-3 gap-3 mb-16">
<div class="glass-card rounded-2xl p-4 flex flex-col items-center justify-center aspect-square relative group overflow-hidden">
<div class="absolute -bottom-4 -right-4 w-12 h-12 bg-delete/30 rounded-full blur-xl transition-transform group-hover:scale-150"></div>
<div class="text-delete mb-2">
<span class="material-symbols-outlined text-2xl">delete_sweep</span>
</div>
<div class="font-display font-bold text-2xl text-white">15</div>
<div class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mt-1">Deleted</div>
</div>
<div class="glass-card rounded-2xl p-4 flex flex-col items-center justify-center aspect-square relative group overflow-hidden">
<div class="absolute -bottom-4 -right-4 w-12 h-12 bg-archive/30 rounded-full blur-xl transition-transform group-hover:scale-150"></div>
<div class="text-archive mb-2">
<span class="material-symbols-outlined text-2xl">auto_awesome</span>
</div>
<div class="font-display font-bold text-2xl text-white">4</div>
<div class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mt-1">Archived</div>
</div>
<div class="glass-card rounded-2xl p-4 flex flex-col items-center justify-center aspect-square relative group overflow-hidden">
<div class="absolute -bottom-4 -right-4 w-12 h-12 bg-slate-400/20 rounded-full blur-xl transition-transform group-hover:scale-150"></div>
<div class="text-slate-400 mb-2">
<span class="material-symbols-outlined text-2xl">bolt</span>
</div>
<div class="font-display font-bold text-2xl text-white">42s</div>
<div class="text-[9px] uppercase tracking-widest text-slate-400 font-bold mt-1">Time</div>
</div>
</div>
<div class="w-full flex flex-col gap-6">
<button class="w-full h-16 bg-slate-100 text-background-dark font-display font-bold text-lg rounded-xl shadow-tech active:translate-y-[6px] active:shadow-[0_4px_0_0_#CBD5E1] transition-all flex items-center justify-center gap-3 group">
                FINISH SESSION
                <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
<button class="flex items-center justify-center gap-2 text-slate-400 hover:text-white transition-colors text-xs font-bold tracking-widest uppercase font-body">
<span class="material-symbols-outlined text-lg">ios_share</span>
                Share Stats
            </button>
</div>
</main>
<div class="flex-none h-8 flex items-center justify-center pb-2">
<div class="w-32 h-1 bg-white/20 rounded-full"></div>
</div>

</body></html>
